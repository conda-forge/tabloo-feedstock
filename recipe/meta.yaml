{% set name = "tabloo" %}
{% set version = "0.1.0" %}
{% set python_min = "3.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tabloo-{{ version }}.tar.gz
  sha256: 7029e21a62b4fc398468a9cdbfa26b8ac8176d87507b20b78dacdf379b2bc5d4

build:
  entry_points:
    - tabloo_cli = tabloo.tabloo_cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel
    - pytest-runner
    - pip
  run:
    - python >={{ python_min }}
    - flask >=2
    - flask-cors
    - pandas >=1.2.0

test:
  imports:
    - tabloo
  commands:
    - pip check
    - tabloo_cli --help
    - echo "Before ls"
    - ls
    - echo "After ls"
    - python -m pytest src_backend_python/tests
  source_files:
    - .
  requires:
    - pip
    - python {{ python_min }}
    - pytest
    - pytest-cov

about:
  home: https://github.com/bluenote10/tabloo
  summary: Minimalistic dashboard app for visualizing tabular data
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
